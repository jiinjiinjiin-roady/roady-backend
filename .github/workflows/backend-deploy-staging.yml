name: Backend Deploy Staging

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: GHCR image tag
        required: true
        default: staging

permissions:
  contents: read

concurrency:
  group: backend-staging-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy staging over Tailscale
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Validate deploy input
        shell: bash
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          STAGING_SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          STAGING_SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          STAGING_SSH_PRIVATE_KEY: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          STAGING_SSH_KNOWN_HOSTS: ${{ secrets.STAGING_SSH_KNOWN_HOSTS }}
          STAGING_DEPLOY_PATH: ${{ vars.STAGING_DEPLOY_PATH }}
        run: |
          set -Eeuo pipefail
          [[ "${IMAGE_TAG}" =~ ^[A-Za-z0-9][A-Za-z0-9_.-]{0,127}$ ]]
          for name in \
            STAGING_SSH_HOST \
            STAGING_SSH_USER \
            STAGING_SSH_PRIVATE_KEY \
            STAGING_SSH_KNOWN_HOSTS \
            STAGING_DEPLOY_PATH
          do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing required staging setting: ${name}" >&2
              exit 1
            fi
          done

      - name: Install SSH credentials
        shell: bash
        env:
          STAGING_SSH_PRIVATE_KEY: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          STAGING_SSH_KNOWN_HOSTS: ${{ secrets.STAGING_SSH_KNOWN_HOSTS }}
        run: |
          set -Eeuo pipefail
          install -d -m 700 ~/.ssh
          printf '%s\n' "${STAGING_SSH_PRIVATE_KEY}" > ~/.ssh/staging
          chmod 600 ~/.ssh/staging
          printf '%s\n' "${STAGING_SSH_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Verify staging SSH
        shell: bash
        env:
          STAGING_SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          STAGING_SSH_USER: ${{ secrets.STAGING_SSH_USER }}
        run: |
          set -Eeuo pipefail
          ssh \
            -i ~/.ssh/staging \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            -o StrictHostKeyChecking=yes \
            "${STAGING_SSH_USER}@${STAGING_SSH_HOST}" \
            'printf "staging ssh ok\n"'

      - name: Copy staging deploy files
        shell: bash
        env:
          STAGING_SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          STAGING_SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          STAGING_DEPLOY_PATH: ${{ vars.STAGING_DEPLOY_PATH }}
        run: |
          set -Eeuo pipefail
          tar -czf /tmp/driving-agent-staging-deploy.tgz -C deploy/staging .
          scp \
            -i ~/.ssh/staging \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            -o StrictHostKeyChecking=yes \
            /tmp/driving-agent-staging-deploy.tgz \
            "${STAGING_SSH_USER}@${STAGING_SSH_HOST}:/tmp/driving-agent-staging-deploy.tgz"
          ssh \
            -i ~/.ssh/staging \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            -o StrictHostKeyChecking=yes \
            "${STAGING_SSH_USER}@${STAGING_SSH_HOST}" \
            "mkdir -p '${STAGING_DEPLOY_PATH}' && tar -xzf /tmp/driving-agent-staging-deploy.tgz -C '${STAGING_DEPLOY_PATH}' && rm -f /tmp/driving-agent-staging-deploy.tgz && chmod +x '${STAGING_DEPLOY_PATH}'/*.sh"

      - name: Run remote deploy
        shell: bash
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          STAGING_SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          STAGING_SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          STAGING_DEPLOY_PATH: ${{ vars.STAGING_DEPLOY_PATH }}
        run: |
          set -Eeuo pipefail
          ssh \
            -i ~/.ssh/staging \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            -o StrictHostKeyChecking=yes \
            "${STAGING_SSH_USER}@${STAGING_SSH_HOST}" \
            "cd '${STAGING_DEPLOY_PATH}' && BACKEND_IMAGE_TAG='${IMAGE_TAG}' ./deploy.sh && ./smoke.sh"

      - name: Write job summary
        if: always()
        shell: bash
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          {
            echo "### Backend staging deploy"
            echo ""
            echo "- Image tag: \`${IMAGE_TAG}\`"
            echo "- Environment: \`staging\`"
            echo "- Access path: Tailscale SSH"
          } >> "${GITHUB_STEP_SUMMARY}"
